<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tom Cobley Pub Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=IM+Fell+English&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --ink: #1a1208;
      --cream: #f5f0e8;
      --amber: #c8860a;
      --aged: #e8dfc8;
    }

    body {
      background-color: var(--cream);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'IM Fell English', serif;
      overflow: hidden;
      position: relative;
    }

    /* Aged paper texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(200,134,10,0.07) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(180,120,8,0.06) 0%, transparent 50%);
      pointer-events: none;
    }

    /* Decorative corner borders */
    .corner {
      position: fixed;
      width: 80px;
      height: 80px;
      border-color: var(--amber);
      border-style: solid;
      opacity: 0.5;
    }
    .corner-tl { top: 24px; left: 24px; border-width: 2px 0 0 2px; }
    .corner-tr { top: 24px; right: 24px; border-width: 2px 2px 0 0; }
    .corner-bl { bottom: 24px; left: 24px; border-width: 0 0 2px 2px; }
    .corner-br { bottom: 24px; right: 24px; border-width: 0 2px 2px 0; }

    .container {
      text-align: center;
      padding: 2rem;
      animation: fadeIn 1.2s ease both;
    }

    .eyebrow {
      font-family: 'IM Fell English', serif;
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 1.2rem;
      opacity: 0;
      animation: fadeIn 1s ease 0.3s both;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 10vw, 7rem);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -0.02em;
      color: var(--ink);
      opacity: 0;
      animation: riseIn 1s ease 0.5s both;
    }

    h1 span {
      display: block;
      color: var(--amber);
    }

    .divider {
      margin: 2rem auto;
      width: 120px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--amber), transparent);
      opacity: 0;
      animation: fadeIn 1s ease 0.9s both;
    }

    .date-block {
      opacity: 0;
      animation: riseIn 1s ease 1.1s both;
    }

    .next-label {
      font-size: 0.78rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 0.5rem;
    }

    .date {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 5vw, 2.8rem);
      font-weight: 900;
      color: var(--ink);
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="container">
    <p class="eyebrow">The Original &amp; Best</p>
    <h1>Tom<span>Cobley</span>Quiz</h1>
    <div class="divider"></div>
    <div class="date-block">
      <p class="next-label">Next Quiz</p>
      <p class="date">March 24</p>
    </div>
  </div>
</body>
</html>
